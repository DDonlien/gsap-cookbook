name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Stamp version into dist
        shell: bash
        run: |
          python3 - <<'PY'
          import os, re, pathlib
          sha = (os.environ.get("GITHUB_SHA", "UNVERSIONED") or "UNVERSIONED")[:7]
          p = pathlib.Path("dist/index.html")
          s = p.read_text(encoding="utf-8")
          s2 = re.sub(r'window\.__REPO_VERSION__\s*=\s*"[^"]*"\s*;', f'window.__REPO_VERSION__ = "{sha}";', s)
          p.write_text(s2, encoding="utf-8")
          print("Stamped version:", sha)
          PY
        env:
          GITHUB_SHA: ${{ github.sha }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
