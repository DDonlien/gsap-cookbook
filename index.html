<!doctype html>
<html class="light" lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GSAP 特效展示</title>
    <script>
      // 可选：用于显示版本号（比如 v0.3.1）。没有构建流程时可以手动改这里。
      window.__REPO_VERSION__ = "UNVERSIONED";
    </script>

    <!-- Tailwind (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-container": "#dde1ff",
              "surface-container-high": "#e5e9e6",
              "surface-container-low": "#f2f4f2",
              "on-tertiary": "#fcf7ff",
              "outline-variant": "#adb3b0",
              "on-tertiary-fixed": "#37354f",
              "on-secondary-fixed-variant": "#5a5b61",
              secondary: "#5d5f65",
              "inverse-surface": "#0d0f0e",
              "secondary-container": "#e2e2e9",
              "primary-fixed": "#dde1ff",
              "on-secondary-fixed": "#3e3f45",
              "tertiary-dim": "#53506b",
              "tertiary-fixed": "#d8d3f4",
              "on-surface-variant": "#5a605e",
              "on-primary-container": "#003dd9",
              "surface-container-lowest": "#ffffff",
              outline: "#767c79",
              "surface-tint": "#1049f1",
              "tertiary-container": "#d8d3f4",
              error: "#9f403d",
              "on-error": "#fff7f6",
              "surface-dim": "#d4dcd8",
              primary: "#1049f1",
              "on-surface": "#2d3432",
              tertiary: "#5f5c78",
              "surface-container": "#ecefec",
              surface: "#f9f9f7",
              background: "#f9f9f7",
              "on-background": "#2d3432"
            },
            borderRadius: {
              DEFAULT: "0px",
              lg: "0px",
              xl: "0px",
              full: "0px"
            },
            fontFamily: {
              headline: ["Space Grotesk", "sans-serif"],
              body: ["Space Grotesk", "sans-serif"],
              label: ["Space Grotesk", "sans-serif"]
            }
          }
        }
      };
    </script>

    <!-- Fonts / Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0,0"
      rel="stylesheet"
    />

    <!-- GSAP (CDN) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <style>
      body {
        font-family: "Space Grotesk", sans-serif;
        background-color: #f9f9f7;
        color: #2d3432;
      }
      /* 滚动条：隐藏但保留可用性 */
      ::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      ::-webkit-scrollbar-track {
        background: #f9f9f7;
        border-left: 0.5px solid #adb3b0;
      }
      ::-webkit-scrollbar-thumb {
        background: #adb3b0;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #1049f1;
      }

      /* demo 预览容器：让动画更稳定，避免布局抖动 */
      .demo-stage {
        width: 100%;
        height: 100%;
        position: relative;
        overflow: hidden;
        contain: layout paint style;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>

  <body class="overflow-hidden w-screen h-screen flex bg-background text-on-surface">
    <!-- SideNavBar -->
    <nav
      class="w-20 h-full flex flex-col border-r-[0.5px] border-outline-variant bg-surface shrink-0 z-20"
    >
      <!-- Header -->
      <div class="h-16 flex flex-col items-center justify-center border-b-[0.5px] border-outline-variant">
        <span class="text-[10px] font-bold tracking-widest uppercase">COOKBOOK</span>
        <span class="text-[8px] text-outline tracking-widest" id="repoVersion" title="仓库版本（如有）"
          >UNVERSIONED</span
        >
      </div>
      <!-- Main Tabs (仅展示，不做复杂路由) -->
      <div class="flex-1 flex flex-col">
        <button
          class="h-20 flex flex-col items-center justify-center gap-1 border-b-[0.5px] border-outline-variant bg-on-surface text-surface transition-colors cursor-default"
        >
          <span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1"
            >grid_view</span
          >
          <span class="text-[8px] font-bold tracking-widest uppercase">GALLERY</span>
        </button>
      </div>
      <!-- Footer -->
      <div class="flex flex-col mt-auto border-t-[0.5px] border-outline-variant">
        <a
          class="h-16 flex flex-col items-center justify-center gap-1 border-b-[0.5px] border-outline-variant text-on-surface hover:bg-surface-container-high transition-colors"
          href="https://github.com/DDonlien/gsap-cookbook"
          target="_blank"
          rel="noreferrer"
        >
          <span class="material-symbols-outlined text-lg">code</span>
          <span class="text-[8px] font-bold tracking-widest uppercase">GITHUB</span>
        </a>
        <a
          class="h-16 flex flex-col items-center justify-center gap-1 text-on-surface hover:bg-surface-container-high transition-colors"
          href="https://gsap.com"
          target="_blank"
          rel="noreferrer"
        >
          <span class="material-symbols-outlined text-lg">open_in_new</span>
          <span class="text-[8px] font-bold tracking-widest uppercase">GSAP</span>
        </a>
      </div>
    </nav>

    <!-- Main Content Area -->
    <div class="flex-1 flex flex-col h-full overflow-hidden relative">
      <!-- TopNavBar -->
      <header
        class="h-20 flex items-stretch border-b-[0.5px] border-outline-variant bg-surface shrink-0 z-10 w-full"
      >
        <div class="h-full px-6 flex items-center border-r-[0.5px] border-outline-variant">
          <h1 class="text-xl font-bold tracking-tight uppercase text-on-surface">GSAP COOKBOOK</h1>
        </div>
        <!-- Search + Sorting (no outer spacing, 2 rows) -->
        <div class="flex-1 h-full flex flex-col overflow-hidden">
          <!-- Row 1: Search -->
          <div class="flex-1 border-b-[0.5px] border-outline-variant">
            <input
              id="searchInput"
              class="w-full h-full px-4 bg-surface text-on-surface text-xs font-mono outline-none"
              placeholder="搜索"
              type="text"
              autocomplete="off"
            />
          </div>
          <!-- Row 2: Sorting -->
          <div class="flex-1 overflow-hidden">
            <div id="tagFilters" class="w-full h-full flex items-stretch overflow-x-auto"></div>
          </div>
        </div>
        <div class="flex h-full">
          <button
            class="h-full px-8 flex items-center justify-center border-l-[0.5px] border-outline-variant text-sm font-bold uppercase tracking-widest text-on-surface hover:bg-on-surface hover:text-surface transition-colors"
            type="button"
            id="btnReset"
          >
            RESET
          </button>
        </div>
      </header>

      <!-- Gallery -->
      <main class="flex-1 overflow-y-auto bg-surface relative">
        <div
          id="galleryGrid"
          class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-2 xl:grid-cols-4 gap-0 w-full"
        ></div>
        <div
          class="h-16 w-full border-t-[0.5px] border-outline-variant bg-surface flex items-center justify-center"
        >
          <span class="text-[10px] text-outline font-bold tracking-widest uppercase">END OF COOKBOOK</span>
        </div>
      </main>
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 hidden z-50">
      <div class="absolute inset-0 bg-black/50" data-modal-close></div>
      <div
        class="absolute inset-4 md:inset-10 bg-surface border-[0.5px] border-outline-variant flex flex-col"
        role="dialog"
        aria-modal="true"
      >
        <div class="h-14 flex items-center justify-between border-b-[0.5px] border-outline-variant px-4">
          <div class="flex flex-col">
            <div class="text-sm font-bold tracking-tight uppercase" id="modalTitle">DEMO</div>
            <div class="text-[10px] text-outline font-mono uppercase tracking-widest" id="modalSubTitle"></div>
          </div>
          <div class="flex items-center gap-2">
            <button
              class="h-9 px-3 border-[0.5px] border-outline-variant hover:bg-primary hover:text-on-primary transition-colors text-xs font-bold tracking-widest uppercase"
              id="btnCopy"
              type="button"
            >
              COPY CODE
            </button>
            <button
              class="h-9 w-9 flex items-center justify-center border-[0.5px] border-outline-variant hover:bg-on-surface hover:text-surface transition-colors"
              type="button"
              data-modal-close
              aria-label="关闭"
              title="关闭"
            >
              <span class="material-symbols-outlined text-base">close</span>
            </button>
          </div>
        </div>

        <!-- Layout:
             - < md: stage / params / code 纵向
             - >= md: stage | params 左右，code 在下面跨两列 -->
        <div class="flex-1 grid grid-cols-1 md:grid-cols-2 md:grid-rows-[minmax(0,1fr)_minmax(0,1fr)] overflow-hidden">
          <!-- Stage -->
          <div class="border-b-[0.5px] md:border-b-0 md:border-r-[0.5px] border-outline-variant bg-surface-container-low">
            <div id="modalStage" class="demo-stage"></div>
          </div>

          <!-- Controls -->
          <div class="bg-surface overflow-hidden flex flex-col border-b-[0.5px] md:border-b-0 border-outline-variant">
            <div class="h-12 px-4 flex items-center justify-between border-b-[0.5px] border-outline-variant">
              <div class="text-[10px] font-mono uppercase tracking-widest text-outline">PARAMETERS</div>
              <button
                class="h-8 px-3 border-[0.5px] border-outline-variant hover:bg-surface-container-high transition-colors text-[10px] font-bold tracking-widest uppercase"
                id="btnResetParams"
                type="button"
              >
                RESET PARAMS
              </button>
            </div>
            <div id="modalControls" class="flex-1 overflow-auto px-4 py-4 grid grid-cols-1 md:grid-cols-1 gap-3"></div>
          </div>

          <!-- Code (span 2 columns on md+) -->
          <div class="bg-surface overflow-auto md:col-span-2 md:border-t-[0.5px] border-outline-variant">
            <pre class="p-4 text-[12px] leading-5 overflow-auto font-mono whitespace-pre"><code id="modalCode"></code></pre>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
